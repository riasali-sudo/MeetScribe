name: Deploy MeetScribe Bot

on:
  workflow_dispatch:
    inputs:
      meeting_url:
        description: "Meeting URL or ID"
        required: true
        type: string
      display_name:
        description: "Bot display name in meeting"
        required: false
        default: "MeetScribe"
        type: string
      platform:
        description: "Meeting platform"
        required: true
        type: choice
        options:
          - webex
          - zoom
          - google_meet

jobs:
  record-and-transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb pulseaudio pulseaudio-utils ffmpeg \
            fonts-liberation libnss3 libatk-bridge2.0-0 \
            libdrm2 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libasound2t64

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium && python -m playwright install-deps chromium

      - name: Start virtual devices
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 -nolisten tcp &
          sleep 1
          pulseaudio --start --exit-idle-time=-1 || true
          sleep 1
          pactl load-module module-null-sink sink_name=MeetScribe sink_properties=device.description=MeetScribe || true
          pactl set-default-sink MeetScribe || true
          pactl set-default-source MeetScribe.monitor || true
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Create output directories
        run: mkdir -p recordings transcripts

      - name: Run bot (record meeting)
        id: bot
        run: |
          python -m bot.engine \
            --platform "${{ github.event.inputs.platform }}" \
            --meeting-url "${{ github.event.inputs.meeting_url }}" \
            --display-name "${{ github.event.inputs.display_name }}"
        env:
          RECORDINGS_DIR: ./recordings
          WHISPER_MODEL: small
          WHISPER_COMPUTE_TYPE: int8

      - name: Derive file base name
        id: names
        if: always()
        run: |
          # Find the most recent .wav to extract the base name
          # Format: {platform}_{meeting_id}_{YYYYMMDD_HHMMSS}.wav
          WAV=$(ls -t recordings/*.wav 2>/dev/null | head -1 || true)
          if [ -n "$WAV" ]; then
            BASE=$(basename "$WAV" .wav)
          else
            PLATFORM="${{ github.event.inputs.platform }}"
            TS=$(date -u +%Y%m%d_%H%M%S)
            BASE="${PLATFORM}_unknown_${TS}"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "File base name: $BASE"

      - name: Transcribe recording
        run: |
          python -c "
          import asyncio, glob, json, os
          from pathlib import Path
          from transcriber.whisper_engine import WhisperTranscriber
          from transcriber.diarizer import diarize_by_silence, merge_short_segments, format_transcript_markdown

          async def main():
              wav_files = sorted(glob.glob('recordings/*.wav'), key=os.path.getmtime, reverse=True)
              wav_files = [f for f in wav_files if not Path(f).name.startswith('_')]
              if not wav_files:
                  print('No recordings found')
                  return

              audio = wav_files[0]
              base = Path(audio).stem  # e.g. webex_m2f0e3fe_20260318_012300
              print(f'Transcribing: {audio} (base: {base})')

              t = WhisperTranscriber()
              result = await t.transcribe(audio)

              diarized = diarize_by_silence(result)
              diarized = merge_short_segments(diarized)

              out_dir = Path('transcripts')
              out_dir.mkdir(exist_ok=True)

              # Save markdown: transcripts/{platform}_{meeting_id}_{timestamp}.md
              md = format_transcript_markdown(diarized)
              md_path = out_dir / f'{base}.md'
              md_path.write_text(md)

              # Save JSON: transcripts/{platform}_{meeting_id}_{timestamp}.json
              data = {
                  'base_name': base,
                  'segments': [{'speaker': s.speaker, 'start': s.start, 'end': s.end, 'text': s.text} for s in diarized],
                  'full_text': result.full_text,
                  'language': result.language,
                  'duration_seconds': result.duration_seconds,
              }
              json_path = out_dir / f'{base}.json'
              json_path.write_text(json.dumps(data, indent=2))

              print(f'Transcription complete: {len(diarized)} segments')
              print(f'Saved: {md_path}, {json_path}')

          asyncio.run(main())
          "

      - name: Upload transcript artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: transcript-${{ steps.names.outputs.base }}
          path: transcripts/
          retention-days: 90

      - name: Upload audio recording
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audio-${{ steps.names.outputs.base }}
          path: |
            recordings/*.wav
            !recordings/_*.wav
          retention-days: 30

      - name: Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-${{ steps.names.outputs.base }}
          path: recordings/debug_*.png
          if-no-files-found: ignore
          retention-days: 7
